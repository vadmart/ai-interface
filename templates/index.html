<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Чат із ШІ</title>
    <style>

        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
        }

        body {
            font-family: sans-serif;
            background-color: #f0f2f5;
            display: flex;
            flex-direction: column;
        }

        .chat {
            display: flex;
            flex: 1;
            flex-direction: column;
            background: #e5ddd5;
            width: 100%;
            height: 100vh;
            /*max-width: 1024px;*/
            margin: 0 auto;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.1);
        }

        header {
            background: #4a90e2;
            color: white;
            padding: 15px;
            font-size: 18px;
            font-weight: bold;
        }

        .chat-box {
            flex-grow: 1;
            list-style: none;
            padding: 15px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .message {
            max-width: 75%;
            padding: 0 12px;
            border-radius: 12px;
            font-size: 14px;
            line-height: 1.4;
            position: relative;
        }

        .message.user {
            align-self: flex-end;
            background-color: #95ecf4;
            border-bottom-right-radius: 0;
        }

        .message.assistant {
            align-self: flex-start;
            background-color: #fff;
            border-bottom-left-radius: 0;
        }

        .input-area {
            background: 0;
            padding: 10px;
            display: flex;
            gap: 10px;
            flex-shrink: 0;
        }

        input[type="text"] {
            flex: 1;
            padding: 10px;
            border-radius: 20px;
            border: none;
            outline: none;
        }

        button.send-btn {
            background: #4a90e2;
            color: white;
            border: none;
            border-radius: 20px;
            padding: 8px 15px;
            cursor: pointer;
            font-weight: bold;
        }
    </style>
</head>

        <header>Чат із ШІ</header>
        <ul class="chat-box" id="messages"></ul>
        <form action="" class="input-area" id="message-form">
            <input type="text" id="message-input" autocomplete="off"/>
            <button class="send-btn">Відправити</button>
        </form>
    </div>

    const messagesUl = document.getElementById('messages');
    const messageForm = document.getElementById("message-form");

    const messageInput = document.getElementById("message-input");
    const messagesList = document.getElementById("messages");
    let currentMessageText = "";
    let currentMessageElement = null;

    messages.forEach(m => {
        const messageLi = document.createElement('li');
        messageLi.innerHTML = marked.parse(m.content);
        messageLi.id = `msg-${m.id}`;
        messageLi.classList.add("message", m.role);
        messagesUl.appendChild(messageLi);
    })


    // Add message to a chat
    function addMessage(data) {
        messages.push(data);
        console.log("Add new message. Messages:", messages);
        const messageLi = document.createElement('li');
        const p = document.createElement('p');
        const textNode = document.createTextNode(data.content);
        p.appendChild(textNode);
        messageLi.appendChild(p);
        messageLi.id = `msg-${data.id}`;
        messageLi.classList.add("message", data.role);
        messagesUl.appendChild(messageLi);
    }

    // Handle incoming messages from WebSocket
    function handleStreamChunk(messageId, token, role) {
        let messageData = messages.find(m => m.id === messageId);

        if (!messageData) {
            messageData = { id: messageId, role: role, content: "" };
            messages.push(messageData);
        }

        messageData.content += token;

        currentMessageElement.id = `msg-${messageId}`;
        currentMessageElement.innerHTML = marked.parse(messageData.content);


        messagesList.scrollTop = messagesList.scrollHeight;
    }

    const ws = new WebSocket("ws://127.0.0.1:10000/ws");
    ws.onopen = function (event) {
        console.log("WebSocket connection established!");
    }
    ws.onmessage = function (event) {
        const currMessage = JSON.parse(event.data);
        handleStreamChunk(currMessage.id, currMessage.content, currMessage.role);
        // handleStreamChunk(currMessage.id, currMessage.content, currMessage.role);
    };
    ws.onclose = function(event) {
      if (event.wasClean) {
        console.log(`[close] Connection closed cleanly, code=${event.code} reason=${event.reason}`);
      } else {
        // Connection died (e.g., server killed process or network down)
        // usually event.code is 1006 in this case
        console.error('[close] Connection died');
        console.log(`Code: ${event.code}`);
        console.log(`Reason: ${event.reason}`);
      }
    };

    ws.onerror = function(error) {
      console.error(`[error] ${JSON.stringify(error)}`);
    };

    // Send message to a server
    function sendMessage(event) {
        event.preventDefault();
        const messageData = {id: crypto.randomUUID(), role: "user", content: messageInput.value}
        addMessage(messageData);
        ws.send(JSON.stringify(messages));
        messageInput.value = "";
        currentMessageText = "";
        currentMessageElement = document.createElement("li");
        currentMessageElement.classList.add("message", "assistant");
        messagesList.appendChild(currentMessageElement);
    }
    messageForm.addEventListener("submit", sendMessage);
