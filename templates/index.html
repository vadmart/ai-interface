<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Чат із ШІ</title>
    <style>
        body {
            font-family: sans-serif;
            background-color: #f0f2f5;
            margin: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .chat-container {
            display: flex;
            flex: 1;
            flex-direction: column;
            background: #e5ddd5;
            width: 100%;
            /*max-width: 1024px;*/
            margin: 0 auto;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.1);
        }

        header {
            background: #4a90e2;
            color: white;
            padding: 15px;
            font-size: 18px;
            font-weight: bold;
        }

        .messages {
            flex: 1;
            padding: 15px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .message {
            max-width: 75%;
            padding: 8px 12px;
            border-radius: 12px;
            font-size: 14px;
            line-height: 1.4;
            position: relative;
        }

        .message.me {
            align-self: flex-end;
            background-color: #95ecf4;
            border-bottom-right-radius: 0;
        }

        .message.other {
            align-self: flex-start;
            background-color: #fff;
            border-bottom-left-radius: 0;
        }

        .input-area {
            background: #e5ddd5;
            padding: 10px;
            display: flex;
            gap: 10px;
        }

        input[type="text"] {
            flex: 1;
            padding: 10px;
            border-radius: 20px;
            border: none;
            outline: none;
        }

        button.send-btn {
            background: #4a90e2;
            color: white;
            border: none;
            border-radius: 20px;
            padding: 8px 15px;
            cursor: pointer;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="chat-container">
    <header>Чат із ШІ</header>
    <ul class="messages" id="messages"></ul>

    <form action="" class="input-area" id="message-form">
        <input type="text" id="message-input" autocomplete="off"/>
        <button class="send-btn">Відправити</button>
    </form>
</div>

<script>

    `
    Message type: {id: 123, role: "assistant", content: "Some text"}
    `

    const messages = [{
        id: crypto.randomUUID(),
        role: "system",
        content: "You're a computer science nerd who answers with a bit of sarcasm"}];
    const messagesUl = document.getElementById('messages');
    const messageForm = document.getElementById("message-form");

    const messageInput = document.getElementById("message-input");

    // Add message to a chat
    function addMessage(data) {
        messages.push(data);
        console.log("Add new message. Messages:", messages);
        const message = document.createElement('li');
        const textNode = document.createTextNode(data.content);
        message.appendChild(textNode);
        message.id = `msg-${data.id}`;
        messagesUl.appendChild(message);
    }

    const messagesList = document.getElementById("messages");

    // Handle incoming messages from WebSocket
    function handleStreamChunk(messageId, token, role) {
        let messageData = messages.find(m => m.id === messageId);

        if (!messageData) {
            messageData = { id: messageId, role: role, content: "" };
            messages.push(messageData);
        }

        messageData.content += token;

        let messageLi = document.getElementById(`msg-${messageId}`);

        if (!messageLi) {
            messageLi = document.createElement("li");
            messageLi.id = `msg-${messageId}`; // Важно: ID должен быть уникальным строковым
            messageLi.classList.add(role); // Например, класс "ai" или "user"
            messagesList.appendChild(messageLi);
        }

        messageLi.textContent += token;

        messagesList.scrollTop = messagesList.scrollHeight;
    }

    const ws = new WebSocket("ws://127.0.0.1:10000/ws");
    ws.onopen = function (event) {
        console.log("WebSocket connection established!");
    }
    ws.onmessage = function (event) {
        const currMessage = JSON.parse(event.data);
        handleStreamChunk(currMessage.id, currMessage.content, currMessage.role);
    };
    ws.onclose = function(event) {
      if (event.wasClean) {
        console.log(`[close] Connection closed cleanly, code=${event.code} reason=${event.reason}`);
      } else {
        // Connection died (e.g., server killed process or network down)
        // usually event.code is 1006 in this case
        console.error('[close] Connection died');
        console.log(`Code: ${event.code}`);
        console.log(`Reason: ${event.reason}`);
      }
    };

    ws.onerror = function(error) {
      console.error(`[error] ${JSON.stringify(error)}`);
    };

    // Send message to a server
    function sendMessage(event) {
        event.preventDefault();
        const messageData = {id: crypto.randomUUID(), role: "user", content: messageInput.value}
        addMessage(messageData);
        messageInput.value = "";
        ws.send(JSON.stringify(messages));
    }
    messageForm.addEventListener("submit", sendMessage);

    // messageInput.addEventListener('keydown', (e) => {
    //     if (e.key === 'Enter') sendMessage(e);
    // });

</script>
</body>
</html>
